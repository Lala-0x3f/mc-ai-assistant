# MC AI Assistant 配置文件示例
# 此文件展示了所有可用的配置选项

# AI API 配置
ai:
  # API 密钥
  api_key: "your-api-key-here"
  
  # API 基础 URL (支持 OpenAI 格式的 API)
  # 示例：
  # - OpenAI 官方: "https://api.openai.com/v1"
  # - poloai.top: "https://poloai.top/v1"
  # - 其他兼容 API: 根据实际情况设置
  api_url: "https://api.openai.com/v1"
  
  # 使用的模型名称
  model: "gpt-3.5-turbo"
  
  # 最大 token 数量
  max_tokens: 1000
  
  # 温度参数 (0.0-2.0)
  temperature: 0.7
  
  # 请求超时时间 (秒)
  timeout: 30

  # 是否模拟浏览器请求头 (提高兼容性，避免被识别为机器人)
  simulate_browser: true

# 聊天配置
chat:
  # AI 在游戏中的显示名称
  ai_name: "AI助手"
  
  # AI 消息前缀
  ai_prefix: "[AI] "
  
  # 是否启用上下文 (发送最近的聊天记录)
  enable_context: true
  
  # 上下文消息数量 (最多发送多少条历史消息)
  context_messages: 10
  
  # AI 触发关键词 (不区分大小写)
  trigger_keywords:
    - "@ai"
    - "@AI"
  
  # 是否启用智能匹配 (避免匹配到 @airport 等词)
  smart_matching: true

# 网络搜索配置
search:
  # 搜索模型
  model: "gpt-4.1-mini"

  # 搜索提示词前缀 (会添加到用户输入前)
  prompt_prefix: "请简短的回答："

  # 搜索工具类型
  tool_type: "web_search_preview"

# 知识库配置
knowledge:
  # 是否启用知识库功能
  enabled: false

  # 知识库内容主题描述 (提示模型何时需要查询本地文档)
  content: "Minecraft 基础教程、玩法指引、红石线路、建筑技巧"

  # 本地知识库存储目录 (位于插件 data 文件夹下)
  folder_name: "knowledge base"
  mapping_file: "knowledge-cache.yml"
  cache_dir: "knowledge-cache"
  refresh_interval_ticks: 6000
  max_combined_chars: 60000

  ai_search:
    enabled: true
    api_url: "https://generativelanguage.googleapis.com"
    model: "models/gemini-2.5-flash-lite"
    api_key: "your-gemini-api-key"
    timeout_seconds: 10

  direct_search:
    enabled: true
    max_snippets: 4
    context_radius: 320

# 网络性能优化配置
network:
  # 连接池配置
  # 连接池可以复用TCP连接，减少建立连接的开销
  connection_pool_max_idle: 5          # 连接池最大空闲连接数（推荐：3-10）
  connection_pool_max_total: 20        # 连接池最大总连接数（推荐：10-50）
  keep_alive_duration: 300             # 连接保持时间（秒，推荐：300-600）

  # 并发请求控制
  # 控制同时发送的请求数量，避免过载
  max_requests: 64                     # 全局最大并发请求数（推荐：32-128）
  max_requests_per_host: 5             # 每个主机最大并发请求数（推荐：3-10）

  # 超时配置（秒）
  # 较短的超时可以更快发现网络问题，但可能导致请求失败
  connect_timeout: 10                  # 连接超时（推荐：5-15秒）
  read_timeout: 30                     # 读取超时（推荐：20-60秒）
  write_timeout: 30                    # 写入超时（推荐：20-60秒）

  # 网络优化选项
  dns_optimization: true               # 启用DNS优化（推荐：true）
  http2_enabled: true                  # 启用HTTP/2支持（推荐：true）

# 系统提示词
system_prompt: |
  你是一个 Minecraft 服务器的 AI 助手。你需要：
  1. 用友好、有帮助的语气回答玩家的问题
  2. 专注于 Minecraft 相关的内容，包括游戏机制、建筑技巧、红石电路等
  3. 如果玩家问非 Minecraft 相关问题，也可以适当回答，但要保持简洁
  4. 回答要简洁明了，适合在游戏聊天中显示
  5. 使用中文回答
  6. 不要在回答中包含过多的格式化字符

# 插件功能配置
features:
  # 是否启用 RedisChat 兼容模式
  redis_chat_compatibility: true
  
  # 是否记录聊天日志
  enable_chat_logging: true
  
  # 是否启用调试模式（排查问题时启用）
  debug_mode: false

# UI 通知配置
notifications:
  # 是否显示 Toast 通知（Action Bar 提示，立即显示）
  enable_toast: true

  # 是否在聊天栏显示 AI 处理状态（延迟 0.3 秒显示）
  enable_chat_status: true

  # AI 处理中的提示消息（支持颜色代码和 Emoji）
  # 注意：此消息会延迟 0.3 秒发送，给 Toast 通知留出显示时间
  processing_message: "🤖 AI 正在处理您的请求，请稍候..."

# 权限配置
permissions:
  # 是否所有玩家都可以使用 AI 助手
  allow_all_players: true
  
  # 如果不允许所有玩家使用，需要的权限节点
  required_permission: "mcaiassistant.use"

# ========================================
# 自定义配置示例
# ========================================

# 示例 1: 关闭所有通知
# notifications:
#   enable_toast: false
#   enable_chat_status: false

# 示例 2: 自定义处理消息
# notifications:
#   processing_message: "⏳ 请稍等，AI 正在思考中..."

# 示例 3: 仅显示 Toast 通知
# notifications:
#   enable_toast: true
#   enable_chat_status: false

# 示例 4: 仅显示聊天状态
# notifications:
#   enable_toast: false
#   enable_chat_status: true
#   processing_message: "💭 AI 助手正在为您准备答案..."

# 示例 5: 带颜色的处理消息
# notifications:
#   processing_message: "&e🤖 &aAI 正在处理您的请求，请稍候..."
#   # 颜色代码说明：
#   # &a = 绿色, &e = 黄色, &c = 红色, &b = 青色
#   # &l = 粗体, &o = 斜体, &n = 下划线, &r = 重置

# ================================
# 图像生成配置
# ================================

# 图像生成功能配置
image_generation:
  # 是否启用图像生成功能
  enabled: false

  # 图像生成 API 地址
  # 默认为本地服务，请根据实际情况修改
  api_url: "http://localhost:8000"

# 图像生成使用说明：
# 1. 启用功能：将 enabled 设置为 true
# 2. 配置 API：设置正确的图像生成服务地址
# 3. 使用方法：玩家可以通过 @ai 命令请求生成图像
#    例如：@ai 给我画一张美丽的日落图
# 4. 获取图像：AI 响应后会显示多个可点击的按钮（通常 4 张图像）
# 5. 美观显示：显示中文描述，悬停显示英文 prompt
# 6. 服务器命令：使用 /image create <文件路径> 获取图像

# 图像生成 API 要求：
# - 接受 POST 请求到 /create 端点
# - 请求格式：{"prompt": "英文描述", "ar": "1:1"}
# - 响应格式：{"job_id": "任务ID", "images": ["图像路径1", "图像路径2"]}
# - 错误响应：{"detail": "错误描述"}

# 注意事项：
# - 图像描述必须是英文，AI 会自动翻译
# - 图像比例固定为 1:1（正方形）
# - 生成时间可能较长，请耐心等待
# - 确保图像生成服务正常运行

# MC AI Assistant 配置示例
# 此文件展示所有可用的配置项，实际运行时会在 plugins/McAiAssistant/config.yml 生成
# MCP 服务器配置请使用同目录下的 mcp.json（默认为空配置，MCP 为禁用）

# AI API 配置
ai:
  api_key: "your-api-key-here"
  api_url: "https://api.openai.com/v1"
  model: "gpt-3.5-turbo"
  max_tokens: 1000
  temperature: 0.7
  timeout: 30
  simulate_browser: true

# 聊天配置
chat:
  ai_name: "AI助手"
  ai_prefix: "[AI] "
  enable_context: true
  context_messages: 10
  trigger_keywords:
    - "@ai"
    - "@AI"
  smart_matching: true
  search_keywords:
    - "@search"
    - "@SEARCH"

# 经济扣费（可选，需 Vault/CMI）
economy:
  enabled: false
  cost_per_use: 10.0
  insufficient_funds_message: "&c余额不足，使用 AI 需要支付 {cost}"
  charge_failed_message: "&c扣费失败，原因: {reason}，本次未响应。"
  balance_message: "&b[AI]&f 余额: {balance}"
  balance_hover_message: "&7余额: {old}->{new}"

# 搜索配置
search:
  model: "gpt-4.1-mini"
  prompt_prefix: "简洁回答"
  tool_type: "web_search_preview"

# 知识库配置
knowledge:
  enabled: false
  content: "Minecraft 服务器规则、插件教程、建筑指南等"
  folder_name: "knowledge base"
  mapping_file: "knowledge-cache.yml"
  cache_dir: "knowledge-cache"
  refresh_interval_ticks: 6000
  max_combined_chars: 60000

  ai_search:
    enabled: true
    api_url: "https://generativelanguage.googleapis.com"
    model: "models/gemini-2.5-flash-lite"
    api_key: "your-gemini-api-key"
    timeout_seconds: 10

  direct_search:
    enabled: true
    max_snippets: 4
    context_radius: 320

# 网络优化
network:
  connection_pool_max_idle: 5
  connection_pool_max_total: 20
  keep_alive_duration: 300
  max_requests: 64
  max_requests_per_host: 5
  connect_timeout: 10
  read_timeout: 30
  write_timeout: 30
  dns_optimization: true
  http2_enabled: true

# 系统提示词
system_prompt: |
  你是一个 Minecraft 服务器的 AI 助手。你需要：
  1. 用友好、有帮助的语气回答玩家的问题
  2. 专注 Minecraft 相关内容：游戏机制、建筑、红石等
  3. 非 Minecraft 问题保持简洁
  4. 回答简短，适合聊天栏显示
  5. 使用中文输出

# 功能开关
features:
  redis_chat_compatibility: true
  enable_chat_logging: true
  debug_mode: false

# 全局记忆（简易规则+摘要）
global_memory:
  enabled: true
  min_length: 12
  min_info_score: 2
  max_entries: 50
  max_summary_length: 200
  max_inject_entries: 3
  max_inject_chars: 320

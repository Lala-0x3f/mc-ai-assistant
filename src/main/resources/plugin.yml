name: McAiAssistant
version: '0.2.1-rc3'
main: com.mcaiassistant.mcaiassistant.McAiAssistant
api-version: '1.21'
description: AI Assistant plugin for PaperMC 1.21.x (1.21-1.21.11)
author: ifctmzzz
website: https://github.com/Lala-0x3f/mc-ai-assistant

# 软依赖 RedisChat 插件
softdepend: [RedisChat, Vault, CMI]

# 权限节点
permissions:
  mcaiassistant.use:
    description: 允许使用 AI 助手
    default: true
  
  mcaiassistant.admin:
    description: 允许管理 AI 助手插件
    default: op
    children:
      mcaiassistant.use: true
  mcaiassistant.test:
    description: 允许执行 AI 助手健康检查指令
    default: op

commands:
  ai:
    description: AI 统一管理指令
    usage: "/ai <info|tools|model|test|whitelist> [...]"
    permission: mcaiassistant.admin
    permission-message: "没有权限执行该命令。"
  model:
    description: 查看或切换当前 AI 模型（兼容旧指令）
    usage: "/model [modelId]"
    permission: mcaiassistant.admin
    permission-message: "没有权限执行该命令。"
  aitest:
    description: 测试 AI 模型与知识库可用性（兼容旧指令）
    usage: "/aitest <model|kb|all>"
    permission: mcaiassistant.admin
    permission-message: "没有权限执行该命令。"
  aicmdwl:
    description: 管理 AI 后台指令白名单（兼容旧指令）
    usage: "/aicmdwl <list|add|remove|reload> [command]"
    permission: mcaiassistant.admin
    permission-message: "没有权限执行该命令。"
